<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student Profile</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body class="company-profile-page">

    <nav class="company-profile-navbar">
        <div class="company-profile-logo">🚀 Launchpath</div>

        <ul class="company-profile-links">
            <li><a th:href="@{/home}">Home</a></li>
            <li><a th:href="@{/student-dashboard}">Dashboard</a></li>
            <li><a th:href="@{/student-profile}">Profile</a></li>
            <li><a th:href="@{/logout}">Logout</a></li>
        </ul>
    </nav>

    <main class="company-profile-container">

        <section class="company-profile-hero">
            <h1>Edit Student Profile</h1>
            <p>Update your student information to keep your profile complete and up to date.</p>
        </section>

        <section class="company-profile-card">

            <div class="company-profile-left">
                <div class="company-profile-image">
                    <img
                            th:src="${student.profilePhotoPath} != null ? ${student.profilePhotoPath} : '/images/logo.png'"
                            alt="Student profile photo"
                    >
                </div>
                <h2 th:text="${student.name}">Student Name</h2>
                <span th:text="${student.major}">Major</span>
            </div>

            <div class="company-profile-right">
                <h2>Edit Information</h2>

                <form th:action="@{/update}" th:object="${student}" method="post" enctype="multipart/form-data">

                    <div class="profile-row">
                        <label for="studentName">Full Name</label>
                        <input type="text" th:field="*{name}" id="studentName" required>
                    </div>

                    <div class="profile-row">
                        <label for="studentEmail">Email</label>
                        <input type="email" th:field="*{email}" id="studentEmail" readonly required>
                    </div>

                    <div class="profile-row">
                        <label for="studentPhone">Phone Number</label>
                        <input type="tel" th:field="*{phoneNum}" id="studentPhone" required>
                    </div>

                    <div class="profile-row">
                        <label for="studentLocation">Location</label>
                        <input type="text" th:field="*{location}" id="studentLocation" required>
                    </div>

                    <div class="profile-row">
                        <label for="studentDob">Date of Birth</label>
                        <input type="date" th:field="*{dateOfBirth}" id="studentDob">
                    </div>

                    <div class="profile-row">
                        <label for="studentUniversity">University</label>
                        <input type="text" th:field="*{university}" id="studentUniversity" required>
                    </div>

                    <div class="profile-row">
                        <label for="studentMajor">Major</label>
                        <input type="text" th:field="*{major}" id="studentMajor" required>
                    </div>

                    <div class="profile-row">
                        <label for="photoInput">Select Profile Picture</label>
                        <div>
                            <input type="file" id="photoInput" accept="image/*">
                            <input type="hidden" th:field="*{profilePhotoPath}" id="profilePhotoPath">
                            <p id="selectedPhoto" style="margin-top: 8px; font-size: 0.9em; color: #666;"></p>
                        </div>
                    </div>

                    <div class="company-profile-buttons">
                        <a th:href="@{/student-profile}" class="profile-btn">Cancel</a>
                        <button type="submit" class="profile-btn">Save Changes</button>
                    </div>
                </form>
            </div>

        </section>

    </main>

    <script>
        const photoInput = document.getElementById('photoInput');
        if (photoInput) {
            photoInput.addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    const filename = file.name;
                    const photoPath = '/images/' + filename;

                    document.getElementById('profilePhotoPath').value = photoPath;
                    document.getElementById('selectedPhoto').textContent = 'Selected: ' + photoPath;
                } else {
                    document.getElementById('profilePhotoPath').value = '';
                    document.getElementById('selectedPhoto').textContent = '';
                }
            });
        }
    </script>

</body>
</html>
