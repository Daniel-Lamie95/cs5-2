<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student Profile - Launchpad</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

    <nav class="navbar">
        <div class="logo">🚀 Launchpad</div>

        <ul class="nav-links">
            <li><a th:href="@{/student-home}">Home</a></li>
            <li><a th:href="@{/about.html}">About Us</a></li>
            <li><a th:href="@{/contact.html}">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Edit Your <span class="highlight">Profile</span></h1>
            <p>
                Update your student information to keep your profile complete and up to date.
            </p>
        </div>

        <div class="form-box company-form-box">
            <h2>Edit Student Profile</h2>

            <form th:action="@{/update}" th:object="${student}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{email}">

                <h3>Personal Information</h3>
                <input type="text" th:field="*{name}" placeholder="Full Name" required>

                <input type="email" th:field="*{email}" placeholder="Email" required disabled>

                <input type="password" th:field="*{password}" placeholder="Password (leave blank to keep current)">

                <input type="tel" th:field="*{phoneNum}" placeholder="Phone Number" required>

                <input type="text" th:field="*{location}" placeholder="Location (City, Country)" required>

                <label>Date of Birth</label>
                <input type="date" th:field="*{dateOfBirth}">

                <h3>Education & Career</h3>
                <input type="text" th:field="*{university}" placeholder="University" required>

                <input type="text" th:field="*{major}" placeholder="Major/Field of Study" required>

                <h3>Documents & Media</h3>
                <label>Upload CV</label>
                <input type="file" name="cv" accept=".pdf,.doc,.docx">

                <label>Upload Profile Picture</label>
                <input type="file" name="logo" accept="image/*">

                <button type="submit" class="form-btn">Save Changes</button>

                <button type="button"
                        class="form-btn"
                        th:onclick="|window.location.href='@{/student-profile}'|">
                    Cancel
                </button>

            </form>
        </div>
    </section>

</body>
</html>
