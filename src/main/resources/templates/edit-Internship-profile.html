<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Internship</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="company-profile-page">

<nav class="company-profile-navbar">

    <div class="company-profile-logo">🚀 Launchpath</div>

    <ul class="company-profile-links">
        <li><a th:href="@{/}">Home</a></li>
        <li><a th:href="@{/company/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/company/logout}">Logout</a></li>
    </ul>

</nav>

<main class="company-profile-container">

    <section class="company-profile-hero">
        <h1>Edit Internship Profile</h1>
        <p>Update Internship information.</p>
    </section>

    <section class="company-profile-card">

        <!-- 🔵 LEFT SIDE -->
        <div class="company-profile-left">

            <div class="company-profile-image">
                <img th:src="${(data.photoPath != null and data.photoPath != '')} ? '/images/' + ${data.photoPath} : '/images/logo.png'" alt="Internship">
            </div>

            <h2 th:text="${data.title}"></h2>

            <span th:text="${data.company.field}"></span>

        </div>

        <!-- 🔵 RIGHT SIDE -->
        <div class="company-profile-right">

            <h2>Edit Internship</h2>

            <form th:action="@{/internships/edit(id=${internship.id})}" method="post">

                <div class="profile-row">
                    <label class="profile-label">Internship Name</label>

                    <input type="text"
                           name="title"
                           th:value="${data.title}">
                </div>

                <div class="profile-row">
                    <label for="photoInput" class="profile-label">Select Internship Picture</label>
                    <div>
                        <input type="file" id="photoInput" accept="image/*">
                        <input type="hidden" name="photoPath" id="photoPath" th:value="${data.photoPath}">
                        <p id="selectedPhoto" style="margin-top: 8px; font-size: 0.9em; color: #666;"></p>
                    </div>
                </div>

                <div class="profile-row">
                    <label class="profile-label">Duration</label>

                    <input type="number"
                           min="1"
                           step="1"
                           name="duration"
                           th:value="${data.duration}">
                </div>

                <div class="profile-row description-row">

                    <label class="profile-label">Description</label>

                    <textarea name="description"
                              rows="5"
                              th:text="${data.description}"></textarea>

                </div>

                <div class="profile-row">

                    <label class="profile-label">Start Date</label>

                    <input type="date"
                           name="startDate"
                           th:value="${data.startDate}">
                </div>

                <div class="profile-row">

                    <label class="profile-label">Maximum Applicants</label>

                    <input type="number"
                           min="1"
                           step="1"
                           name="maxApplicants"
                           th:value="${data.maxApplicants}"
                           required>

                </div>

                <!-- Company fields removed from internship edit form: edits to company profile must use Company edit page -->

                <div class="company-profile-buttons">

                    <a th:href="@{/company/dashboard}"
                       class="profile-btn">
                        Cancel
                    </a>

                    <button type="submit"
                            class="profile-btn">
                        Save Changes
                    </button>

                </div>

            </form>

        </div>

    </section>

</main>

<script>
    // Handle photo file selection
    document.getElementById('photoInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            // Extract filename and create path
            const filename = file.name;
            const photoPath = '/images/' + filename;

            // Set the hidden field value
            document.getElementById('photoPath').value = photoPath;

            // Show feedback to user
            document.getElementById('selectedPhoto').textContent = 'Selected: ' + photoPath;
        } else {
            document.getElementById('photoPath').value = '';
            document.getElementById('selectedPhoto').textContent = '';
        }
    });
</script>

</body>
</html>
