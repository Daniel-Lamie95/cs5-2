<!DOCTYPE html>

//this class is totally wrong please fix
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Internship</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body class="company-dashboard-page">

<nav class="company-profile-navbar">
    <div class="company-profile-logo">🚀 Launchpad</div>

    <ul class="company-profile-links">
        <li><a th:href="@{/}">Home</a></li>
        <li><a th:href="@{/company/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/company/profile}">Profile</a></li>
        <li><a th:href="@{/company/logout}">Logout</a></li>
    </ul>
</nav>

<main class="company-profile-container">

    <section class="company-profile-hero">
        <h1>Edit Internship</h1>
        <p>Update your internship information.</p>
    </section>

    <section class="company-profile-card">

        <div class="company-profile-left">
            <div class="company-profile-image">
                <img th:src="@{/images/main_logo.jpeg}">
            </div>
            <h2 th:text="${internship?.title ?: 'Internship Title'}">Internship Title</h2>
            <span th:text="${internship?.companyName ?: 'Company Name'}">Company Name</span>
        </div>

        <div class="company-profile-right">
            <h2>Edit Information</h2>

            <p th:if="${error}" th:text="${error}" style="color: red;"></p>

            <form th:action="@{/company/edit-internship/{id}(id=${internship.id})}"
              th:object="${internship}"
              method="post">

            <div class="profile-row">
                <label>Title</label>
                <input type="text" th:field="*{title}">
            </div>

            <div class="profile-row">
                <label>Company Name</label>
                <input type="text" th:field="*{companyName}" readonly>
            </div>

            <div class="profile-row">
                <label>Start Date</label>
                <input type="date" th:field="*{startDate}">
            </div>

            <div class="profile-row">
                <label>End Date</label>
                <input type="date" th:field="*{endDate}">
            </div>

            <div class="profile-row">
                <label>Duration (months)</label>
                <input type="number" th:field="*{duration}">
            </div>

            <div class="profile-row">
                <label>Max Applicants</label>
                <input type="number" th:field="*{maxApplicants}">
            </div>

            <div class="profile-row description-row">
                <label>Requirements</label>
                <textarea th:field="*{requirements}"></textarea>
            </div>

            <div class="company-profile-buttons">

                <a th:href="@{/company/dashboard}" class="profile-btn">
                    Cancel
                </a>

                <button type="submit" class="profile-btn">
                    Save Changes
                </button>

            </div>
            </form>
        </div>

    </section>

</main>

</body>
</html>
