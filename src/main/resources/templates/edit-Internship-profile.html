<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Internship</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="company-profile-page">

<nav class="company-profile-navbar">

    <div class="company-profile-logo">🚀 Launchpad</div>

    <ul class="company-profile-links">
        <li><a th:href="@{/index}">Home</a></li>
        <li><a th:href="@{/company-dashboard}">Dashboard</a></li>
        <li><a th:href="@{/logout}">Logout</a></li>
    </ul>

</nav>

<main class="company-profile-container">

    <section class="company-profile-hero">
        <h1>Edit Internship Profile</h1>
        <p>Update Internship information.</p>
    </section>

    <section class="company-profile-card">

        <!-- 🔵 LEFT SIDE -->
        <div class="company-profile-left">

            <div class="company-profile-image">
                <img th:src="@{'/images/' + ${data.logo}}" alt="Logo">
            </div>

            <h2 th:text="${data.title}"></h2>

            <span th:text="${data.field}"></span>

        </div>

        <!-- 🔵 RIGHT SIDE -->
        <div class="company-profile-right">

            <h2>Edit Internship</h2>

            <form th:action="@{/internships/edit(id=${internship.id})}" method="post">

                <div class="profile-row">
                    <label class="profile-label">Duration</label>

                    <input type="number"
                           min="1"
                           step="1"
                           name="duration"
                           th:value="${data.duration}">
                </div>

                <div class="profile-row description-row">

                    <label class="profile-label">Description</label>

                    <textarea name="description"
                              rows="5"
                              th:text="${data.description}"></textarea>

                </div>

                <div class="profile-row">

                    <label class="profile-label">Start Date</label>

                    <input type="date"
                           name="startDate"
                           th:value="${data.startDate}">
                </div>

                <div class="profile-row">

                    <label class="profile-label">Location</label>

                    <input type="text"
                           name="location"
                           th:value="${data.location}">
                </div>

                <div class="profile-row">

                    <label class="profile-label">Field / Industry</label>

                    <input type="text"
                           name="field"
                           th:value="${data.field}">
                </div>

                <div class="company-profile-buttons">

                    <a th:href="@{/company-dashboard}"
                       class="profile-btn">
                        Cancel
                    </a>

                    <button type="submit"
                            class="profile-btn">
                        Save Changes
                    </button>

                </div>

            </form>

        </div>

    </section>

</main>

</body>
</html>
