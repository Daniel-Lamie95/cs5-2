<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students</title>
</head>
<body>
<h1>Students</h1>
<p th:if="${successMessage}" th:text="${successMessage}"></p>

<form th:action="@{/students}" th:object="${studentForm}" method="post">
    <label>Name: <input type="text" th:field="*{name}" required></label><br>
    <label>Email: <input type="email" th:field="*{email}" required></label><br>
    <label>Major: <input type="text" th:field="*{major}" required></label><br>
    <button type="submit">Add Student</button>
</form>

<h2>Student List</h2>
<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Major</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="student : ${students}">
        <td th:text="${student.name}">Name</td>
        <td th:text="${student.email}">Email</td>
        <td th:text="${student.major}">Major</td>
    </tr>
    </tbody>
</table>

<p><a th:href="@{/}">Back to Home</a></p>
</body>
</html>
