

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>University Ranking</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f7fb;
            padding:40px;
        }

        .container{
            width:80%;
            margin:auto;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#1e3a8a;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        th{
            background:#2563eb;
            color:white;
            padding:15px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #eee;
        }

        tr:hover{
            background:#f1f5ff;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🏆 University Ranking</h1>

    <table>

        <thead>
        <tr>
            <th>University</th>
            <th>Performance Score</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="entry : ${ranking}">

            <td th:text="${entry.key}"></td>

            <td th:text="${entry.value}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
