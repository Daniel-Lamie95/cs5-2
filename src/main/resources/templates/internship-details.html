<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0">

    <title>
        Internship Details
    </title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body class="company-dashboard-page">

<nav class="company-dashboard-navbar">

    <div class="company-profile-logo">
        🚀 Launchpath
    </div>

    <ul class="company-profile-links">

        <li>
            <a th:href="${isStudent ? '/student-dashboard' : (isCompany ? '/company/dashboard' : '/student-dashboard')}">
                Home
            </a>
        </li>

        <li>
            <a th:href="${isStudent ? '/internships/available-internships' : '/company/dashboard'}">
                Dashboard
            </a>
        </li>

        <li>
            <a th:href="${isCompany ? '/company/logout' : '/logout'}">
                Logout
            </a>
        </li>

    </ul>

</nav>

<main class="company-profile-container">

    <section class="company-profile-hero">

        <h1>
            Internship Details
        </h1>

        <p>
            View internship details and apply.
        </p>

    </section>

    <div th:if="${message}"

         style="
     background-color: #f8d7da;
     color: #721c24;
     padding: 12px;
     margin: 20px;
     border-radius: 4px;
     border: 1px solid #f5c6cb;">

    <span th:text="${message}">
    </span>

    </div>
    <div th:if="${error}"
         style="background-color: #f8d7da; color: #721c24; padding: 15px; margin: 20px 0; border-radius: 8px; border-left: 5px solid #dc3545;">
        <strong> </strong> <span th:text="${error}"></span>
    </div>

    <section class="company-profile-card">

        <div class="company-profile-left">

            <div class="company-profile-image">

                <img th:src="${(data.photoPath != null and data.photoPath != '')} ? '/images/' + ${data.photoPath} : '/images/logo.png'"
                     alt="logo">

            </div>

            <h2 th:text="${data.title}">
            </h2>

        </div>

        <div class="company-profile-right">

            <h2>
                Internship Information
            </h2>

            <div class="profile-row">

            <span class="profile-label">
                Internship Name
            </span>

                <span class="profile-value"
                      th:text="${data.title}">
            </span>

            </div>

            <div class="profile-row">

            <span class="profile-label">
                Company
            </span>

                <span class="profile-value"
                      th:text="${data.companyName}">
            </span>

            </div>

            <div class="profile-row">

            <span class="profile-label">
                Duration
            </span>

                <span class="profile-value"
                      th:text="${data.duration}">
            </span>

            </div>

            <div class="profile-row">

            <span class="profile-label">
                Description
            </span>

                <span class="profile-value"
                      th:text="${data.description}">
            </span>

            </div>

            <div class="profile-row">

            <span class="profile-label">
                Start Date
            </span>

                <span class="profile-value"
                      th:text="${data.startDate}">
            </span>

            </div>

            <div class="profile-row">

            <span class="profile-label">
                Remaining Time
            </span>

                <span class="profile-value"

                      th:text=
                              "${@internshipService
                  .calculateRemainingTime(
                  data.startDate)}">

            </span>

            </div>

            <div class="profile-row">

            <span class="profile-label">
                Applicants
            </span>

                <span class="profile-value">

                <span th:text="${data.applicantsCount}">
                </span>

                /

                <span th:text="${data.maxApplicants}">
                </span>

            </span>

            </div>

            <div class="company-profile-buttons">

                <form th:if="${showApplyButton && !hasAlreadyApplied}"
                      th:action="@{/internships/apply}"
                      method="post"
                      style="display: inline;">
                    <input type="hidden" name="id" th:value="${data.id}" />
                    <button type="submit" class="profile-btn">Apply Internship</button>
                </form>

                <form th:if="${showApplyButton && hasAlreadyApplied}"
                      th:action="@{/internships/revoke-application}"
                      method="post"
                      style="display: inline;">
                    <input type="hidden" name="id" th:value="${data.id}" />
                    <button type="submit" class="profile-btn" style="background-color: #ff6b6b;">Revoke Application</button>
                </form>

                <a th:if="${showOwnerEditButton}"
                   th:href="@{/internships/edit(id=${data.id})}"
                   class="profile-btn">
                    Edit Internship
                </a>

                <div th:if="${message}" style="margin-top: 15px; color: green; padding: 10px; background: #d4edda; border-radius: 4px;">
                    <strong>✓</strong> <span th:text="${message}"></span>
                </div>

                <div th:if="${error}" style="margin-top: 15px; color: #721c24; padding: 10px; background: #f8d7da; border-radius: 4px;">
                    <strong>✗</strong> <span th:text="${error}"></span>
                </div>

                <div th:if="${applicationStatus}" style="margin-top: 15px; padding: 10px; background: #e7f3ff; border-radius: 4px; border-left: 4px solid #2196F3;">
                    <strong>Application Status:</strong> <span th:text="${applicationStatus}" style="font-weight: bold; color: #2196F3;"></span>
                </div>

            </div>

        </div>

    </section>

</main>

</body>
</html>
