<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Register - Launchpad</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

    <nav class="navbar">
        <div class="logo">🚀 Launchpad</div>

        <ul class="nav-links">
            <li><a th:href="@{/student-home}">Home</a></li>
            <li><a th:href="@{/about.html}">About Us</a></li>
            <li><a th:href="@{/contact.html}">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Complete Your <span class="highlight">Profile</span></h1>
            <p>
                Add your details to start applying to internships and connect with companies.
            </p>
        </div>

        <div class="form-box company-form-box">
            <h2>Student Register</h2>

            <form th:action="@{/register}" method="post">

            <input type="text" name="name" minlength="3" placeholder="Name" required>

            <input type="email" name="email" maxlength="60" placeholder="Email" required>

            <input type="password" name="password" minlength="6" placeholder="Password" required>

            <input type="text" name="university" placeholder="University" required>

            <input type="text" name="major" placeholder="Major" required>
                <label class="file-label">Date of Birth</label>
                <input type="date" name="dateOfBirth">
                <br><br>

                <label class="file-label">Select Profile Image (Optional)</label>
                <input type="file" id="photoInput" accept="image/*">
                <input type="hidden" name="profilePhotoPath" id="profilePhotoPath">
                <p id="selectedPhoto" style="margin-top: 8px; font-size: 0.9em; color: #666;"></p>

                <button type="submit" class="form-btn">Complete Registration</button>
            </form>
        </div>
    </section>

    <script>
        // Handle profile photo file selection
        document.getElementById('photoInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                // Extract filename and create path
                const filename = file.name;
                const photoPath = '/images/' + filename;

                // Set the hidden field value
                document.getElementById('profilePhotoPath').value = photoPath;

                // Show feedback to user
                document.getElementById('selectedPhoto').textContent = 'Selected: ' + photoPath;
            } else {
                document.getElementById('profilePhotoPath').value = '';
                document.getElementById('selectedPhoto').textContent = '';
            }
        });
    </script>

</body>
</html>
