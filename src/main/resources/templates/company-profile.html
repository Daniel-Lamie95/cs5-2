<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profile - Launchpad</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body class="company-profile-page">

    <nav class="company-profile-navbar">
        <div class="company-profile-logo">🚀 Launchpad</div>

        <ul class="company-profile-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/company/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/company/logout}">Logout</a></li>
        </ul>
    </nav>

    <main class="company-profile-container">

        <section class="company-profile-hero">
            <h1>Company Profile</h1>
            <p>View your company details and manage your profile information.</p>
        </section>

        <section class="company-profile-card">

            <div class="company-profile-left">
                <div class="company-profile-image">
                    <img th:src="@{/images/main_logo.jpeg}" alt="Company Logo">
                </div>
                <h2  th:text="${company.name}">Company Name</h2>
                <span th:text="${company.industry}">Industry</span>
            </div>

            <div class="company-profile-right">
                <h2>Profile Information</h2>

                <div class="profile-row">
                    <span class="profile-label">Company Name</span>
                    <span class="profile-value" th:text="${company.name}"></span>
                </div>

                <div class="profile-row">
                    <span class="profile-label">Email</span>
                    <span class="profile-value" th:text="${company.email}"></span>
                </div>

                <div class="profile-row">
                    <span class="profile-label">Phone Number</span>
                    <span class="profile-value" th:text="${company.phone}"></span>
                </div>

                <div class="profile-row">
                    <span class="profile-label">Location</span>
                    <span class="profile-value" th:text="${company.location}"></span>
                </div>

                <div class="profile-row">
                    <span class="profile-label">Industry</span>
                <span class="profile-value" th:text="${company.industry}"></span>
                </div>

                <div class="profile-row">
                    <span class="profile-label">Website</span>
                    <span class="profile-value" th:text="${company.website}"></span>
                </div>

                <div class="profile-row description-row">
                    <span class="profile-label">Description</span>
                    <span class="profile-value" th:text="${company.description}"></span>
                </div>

                <div class="company-profile-buttons">
                    <a th:href="@{/company/edit-profile}" class="profile-btn">
                    Edit Profile
                </a>

                <a th:href="@{/company/dashboard}" class="profile-btn">
                    Back to Dashboard
                </a>

            </div>

        </div>

        </section>

    </main>

</body>
</html>
