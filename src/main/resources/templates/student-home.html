<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav class="navbar navbar-theme" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
             <img src="./images/main_logo.jpeg" alt="Logo" width="50" height="44" class="d-inline-block align-text-top">
                <span class="brand-text">Launchpad</span>
            </a>
            <div class="navbar-links ms-auto">
                <a href="./student_home.html" class="nav-link-custom">Home</a>
                <a href="./student_profile.html" class="nav-link-custom">Profile</a>
            </div>
        </div>
    </nav>
    <main class="home-content">
        <div id="carouselExample" class="carousel slide">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="./images/ad1.png" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="./images/ad2.png" class="d-block w-100" alt="...">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </main>

     <section class="profile-card mt-4">
                <h3 class="section-title">Avalible Internships</h3>
                <div class="row g-3">
                    <div class="col-12 col-md-6 col-xl-4">
                        <article class="internship-item h-100">
                            <h4 class="internship-company">Microsoft Egypt</h4>
                            <p class="internship-role">Frontend Developer Intern</p>
                            <p class="internship-period mb-0">June 2026 - August 2026</p>
                            <div class="d-grid gap-2 col-6 mx-auto">
                                <button class="btn btn-primary apply-btn" type="button">Apply</button>
                            </div>      
                        </article>
                    </div>
                    <div class="col-12 col-md-6 col-xl-4">
                        <article class="internship-item h-100">
                            <h4 class="internship-company">Vodafone</h4>
                            <p class="internship-role">Data Analyst Intern</p>
                            <p class="internship-period mb-0">July 2026 - September 2026</p>
                            <div class="d-grid gap-2 col-6 mx-auto">
                                <button class="btn btn-primary apply-btn" type="button">Apply</button>
                            </div>
                        </article>
                    </div>
                    <div class="col-12 col-md-6 col-xl-4">
                        <article class="internship-item h-100">
                            <h4 class="internship-company">Orange Digital Center</h4>
                            <p class="internship-role">Full Stack Intern</p>
                            <p class="internship-period mb-0">August 2026 - October 2026</p>
                            <div class="d-grid gap-2 col-6 mx-auto">
                                <button class="btn btn-primary apply-btn" type="button">Apply</button>
                            </div>
                        </article>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.apply-btn').forEach(function (button) {
            button.addEventListener('click', function () {
                if (button.classList.contains('applied')) {
                    return;
                }

                button.classList.add('applied');
                button.textContent = 'Applied';
                button.disabled = true;
                button.setAttribute('aria-label', 'Applied');
            });
        });
    </script>
</body>
</html>
