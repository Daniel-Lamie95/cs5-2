<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launchpad - Login</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

    <nav class="navbar">
        <div class="logo">🚀 Launchpad</div>

        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/about.html}">About Us</a></li>
            <li><a th:href="@{/contact.html}">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Internship <span class="highlight">Launchpad</span></h1>
            <p>
                Launch your journey toward internships, growth, and real opportunities.
            </p>
            <a th:href="@{/register}" class="main-btn">
            Create Account
        </a>
        </div>

        <div class="form-box">
            <h2>Login</h2>

            <div th:if="${message}" style="color: green; margin-bottom: 12px; text-align: center;">
                <strong th:text="${message}"></strong>
            </div>

            <div th:if="${error}" style="color: red; margin-bottom: 12px; text-align: center;">
                <strong th:text="${error}"></strong>
            </div>

            <form action="/login" th:action="@{/login}" method="post">
                <div style="display:flex; gap:16px; margin-bottom:12px;">
                    <label>
                        <input type="radio" name="userType" value="student"
                               th:checked="${selectedUserType == null || selectedUserType == 'student'}" checked>
                        Student
                    </label>
                    <label>
                        <input type="radio" name="userType" value="company"
                               th:checked="${selectedUserType == 'company'}">
                        Company
                    </label>
                </div>
                <input type="text" name="email" placeholder="Enter Email" required>
                <input type="password" name="password" placeholder="Enter Password" required>

                <button type="submit" class="form-btn">Login</button>
            </form>

            <p class="switch-text">
                Don’t have an account?
                <br><br>
                <a href="/register" th:href="@{/register}" class="main-btn" style="display:inline-block; margin-right:8px;">Register as Student</a>
                <a href="/company/register" th:href="@{/company/register}" class="main-btn" style="display:inline-block;">Register as Company</a>
            </p>
        </div>
    </section>


</body>
</html>
