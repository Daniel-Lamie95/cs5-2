<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body class="company-profile-page">

    <nav class="company-profile-navbar">
        <div class="company-profile-logo">🚀 Launchpad</div>

        <ul class="company-profile-links">
            <li><a th:href="@{/student-home}">Home</a></li>
            <li><a th:href="@{/student-dashboard}">Dashboard</a></li>
            <li><a th:href="@{/logout}">Logout</a></li>
        </ul>
    </nav>

    <main class="company-profile-container">

        <section class="company-profile-hero">
            <h1>Student Profile</h1>
            <p>View your details and manage your profile information.</p>
        </section>

        <section class="company-profile-card">

            <div class="company-profile-left">
                <div class="company-profile-image">
                    <img
                            th:src="@{/student/{id}/photo(id=${student.id})}"
                    alt="Student profile photo"
                    >
                </div>
                <h2 th:text="${student.name}">Student Name</h2>
            </div>

            <div class="company-profile-right">
                <h2>Profile Information</h2>

                <div class="profile-row">
                    <span class="profile-label">Name</span>
                    <span class="profile-value" th:text="${student.name}">name</span>
                </div>

                <div class="profile-row">
                    <span class="profile-label">Email</span>
                    <span class="profile-value" th:text="${student.email}">email</span>
                </div>

                <div class="profile-row">
                    <span class="profile-label">Phone Number</span>
                    <span class="profile-value" th:text="${student.phoneNum}">phone</span>
                </div>

                <div class="profile-row">
                    <span class="profile-label">Location</span>
                    <span class="profile-value" th:text="${student.location}">location</span>
                </div>

                <div class="profile-row">
                    <span class="profile-label">Major</span>
                    <span class="profile-value" th:text="${student.major}">major</span>
                </div>

                <div class="company-profile-buttons">
                    <a th:href="@{/edit-student-profile}" class="profile-btn">
                    Edit Profile
                </a>

                <a th:href="@{/student-dashboard}" class="profile-btn">
                    Back to Dashboard
                </a>
                </div>
            </div>

        </section>

    </main>

</body>
</html>
