<!DOCTYPE >
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Dashboard</title>
</head>
<body>

    <div>

        <h1>Company Dashboard</h1>
        <p>Welcome to your company dashboard</p>

        <!-- Company Info -->
        <div>
            <img src="company-logo.png" alt="Company Logo" width="120" height="120">
            <h2>Company Name</h2>
        </div>

        <hr>

        <!-- Profile Section -->
        <div>
            <h3>Profile</h3>
            <button onclick="location.href='company-profile.html'">
                View Profile
            </button>
        </div>

        <br>
        <hr>

        <!-- Internship Section -->
        <div>
            <h3>Internship Management</h3>

            <button onclick="location.href='post-internship.html'">
                Post Internship
            </button>

            <button onclick="location.href='manage-internships.html'">
                Manage Internships
            </button>
        </div>

        <br>
        <hr>

        <!-- Applicants Section -->
        <div>
            <h3>Applicants</h3>

            <button onclick="location.href='view-applicants.html'">
                View Applicants
            </button>
        </div>

        <br>
        <hr>

        <!-- Logout -->
        <div>
            <button onclick="location.href='login.html'">
                Logout
            </button>
        </div>

    </div>

</body>
</html>
