<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Company Profile</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body class="company-profile-page">

    <nav class="company-profile-navbar">
        <div class="company-profile-logo">🚀 Launchpad</div>

        <ul class="company-profile-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/company/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/company/profile}">Profile</a></li>
            <li><a th:href="@{/company/logout}">Logout</a></li>
        </ul>
    </nav>

    <main class="company-profile-container">

        <section class="company-profile-hero">
            <h1>Edit Company Profile</h1>
            <p>Update your company information.</p>
        </section>

        <section class="company-profile-card">

            <div class="company-profile-left">
                <div class="company-profile-image">
                    <img th:src="@{/images/main_logo.jpeg}">
                </div>
                <h2 th:text="${company.name}">Company Name</h2>
                <span th:text="${company.industry}">Industry</span>
            </div>

            <div class="company-profile-right">
                <h2>Edit Information</h2>

                <form th:action="@{/company/edit-profile}"
                  th:object="${company}"
                  method="post">

                <div class="profile-row">
                    <label>Company Name</label>
                    <input type="text" th:field="*{name}">
                </div>

                <div class="profile-row">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" readonly>
                </div>

                <div class="profile-row">
                    <label>Phone</label>
                    <input type="text" th:field="*{phone}">
                </div>

                <div class="profile-row">
                    <label>Location</label>
                    <input type="text" th:field="*{location}">
                </div>

                <div class="profile-row">
                    <label>Industry</label>
                    <input type="text" th:field="*{industry}">
                </div>

                <div class="profile-row">
                    <label>Website</label>
                    <input type="url" th:field="*{website}">
                </div>

                <div class="profile-row description-row">
                    <label>Description</label>
                    <textarea th:field="*{description}"></textarea>
                </div>

                <div class="company-profile-buttons">

                    <a th:href="@{/company/profile}" class="profile-btn">
                        Cancel
                    </a>

                    <button type="submit" class="profile-btn">
                        Save Changes
                    </button>

                </div>
                </form>
            </div>

        </section>

    </main>

</body>
</html>
