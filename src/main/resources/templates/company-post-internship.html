<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Internship Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="company-profile-page">

<nav class="company-profile-navbar">

    <div class="company-profile-logo">🚀 Launchpath</div>

    <ul class="company-profile-links">
        <li><a th:href="@{/home}">Home</a></li>
        <li><a th:href="@{/company/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/company/logout}">Logout</a></li>
    </ul>

</nav>

<main class="company-profile-container">

    <section class="company-profile-hero">

        <h1>Post Internship</h1>

        <p>Enter internship information.</p>

    </section>

    <section class="company-profile-card">

        <div class="company-profile-left">

            <div class="company-profile-image">
                <img th:src="${(internship.photoPath != null and internship.photoPath != '')} ? '/images/' + ${internship.photoPath} : (${company.logo} != null ? ${company.logo} : '/images/main_logo.jpeg')"
                     alt="Internship image preview">
            </div>

            <h2 th:text="${company.name}">Company</h2>

            <span>Internship Posting</span>

        </div>

        <div class="company-profile-right">

            <h2>New Internship</h2>

            <div th:if="${error}" class="profile-row" style="color:#b00020;margin-bottom:12px;" th:text="${error}"></div>

            <form th:action="@{/company/post-internship}" th:object="${internship}" method="post">

                <div class="profile-row">

                    <label class="profile-label">Internship Title</label>

                    <input type="text"
                           th:field="*{title}"
                           required>

                </div>

                <div class="profile-row">

                    <label class="profile-label">Photo file name (optional)</label>

                    <input type="text"
                           th:field="*{photoPath}"
                           placeholder="e.g. ad1.png — leave blank to use your company logo">

                </div>

                <div class="profile-row">

                    <label class="profile-label">Duration</label>

                    <input type="number" min="1" step="1" th:field="*{duration}" required> in Months

                </div>

                <div class="profile-row description-row">

                    <label class="profile-label">Description</label>

                    <textarea th:field="*{description}"
                              rows="5"
                              required></textarea>

                </div>

                <div class="profile-row">

                    <label class="profile-label">Start Date</label>

                    <input type="date"
                           th:field="*{startDate}"
                           required>

                </div>

                <div class="profile-row">

                    <label class="profile-label">Location</label>

                    <input type="text"
                           th:field="*{location}"
                           required>



                </div>

                <div class="profile-row">

                    <label class="profile-label">Field / Industry</label>

                    <input type="text"
                           th:field="*{field}"
                           required>

                </div>

                <div class="profile-row">

                    <label class="profile-label">Maximum Applicants</label>

                    <input type="number"
                           min="1"
                           step="1"
                           th:field="*{maxApplicants}"
                           required>

                </div>

                <div class="company-profile-buttons">

                    <a th:href="@{/company-dashboard}"
                       class="profile-btn">
                        Cancel
                    </a>

                    <button type="submit"
                            class="profile-btn">
                        Post Internship
                    </button>

                </div>

            </form>

        </div>

    </section>

</main>

</body>
</html>
