<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Dashboard - Launchpad</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="company-dashboard-page">

<nav class="company-dashboard-navbar">

    <div class="company-dashboard-logo">🚀 Launchpad</div>

    <ul class="company-dashboard-links">
        <li><a th:href="@{/student-dashboard}">Home</a></li>
        <li><a th:href="@{/student-profile}">Profile</a></li>
        <li><a th:href="@{/logout}">Logout</a></li>
    </ul>

</nav>

<main class="company-dashboard-container">

    <section class="company-dashboard-hero">

        <div>
            <h1>Latest Internships & Summer Training</h1>

            <p>
                Internships help you gain practical skills, grow your professional network,
                and stand out to future employers.
            </p>

        </div>

    </section>

    <section class="company-dashboard-stats">

        <div class="dashboard-stat-card">
            <h3>12</h3>
            <p>Posted Internships</p>
        </div>

        <div class="dashboard-stat-card">
            <h3>48</h3>
            <p>Applicants</p>
        </div>

        <div class="dashboard-stat-card">
            <h3>6</h3>
            <p>Active Internships</p>
        </div>

    </section>

    <section class="search-section">

        <div class="search-box">

            <form action="" method="get">

                <input type="text"
                       name="keyword"
                       placeholder="Search internships...">

                <button type="submit">Search</button>

            </form>

        </div>

    </section>

    <section class="company-dashboard-internships">

        <h2>Recent Internships</h2>

        <div class="company-dashboard-internships-grid">

            <a th:each="row : ${internships}"
               th:href="@{/internship-details(id=${row.id})}"
               class="dashboard-internship-card">

                <h3 th:text="${row.title}"></h3>

                <p th:text="${row.field}"></p>

                <span th:text="${row.startDate}"></span>

            </a>

        </div>

    </section>

</main>

</body>
</html>l>
