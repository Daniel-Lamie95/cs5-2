<!DOCTYPE html>
<html >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Registration</title>
</head>
<body>

    <div>
        <h1>Complete Company Registration</h1>
        <p>Please enter your company details</p>

        <form action="companyRegister" method="post">

            <label for="industry">Industry / Field:</label><br>
            <input type="text" id="industry" name="industry" required><br><br>

            <label for="location">Location:</label><br>
            <input type="text" id="location" name="location" required><br><br>

            <label for="website">Website:</label><br>
            <input type="url" id="website" name="website"><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone" required><br><br>

            <label for="description">Company Description:</label><br>
            <textarea id="description" name="description" rows="5" cols="30" required></textarea><br><br>

            <input type="submit" value="Save Registration">

        </form>
    </div>

</body>
</html>
