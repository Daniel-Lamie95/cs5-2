<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Register - Launchpath</title>
    <link  rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

    <nav class="navbar">
        <div class="logo">🚀 Launchpath</div>

        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/about}">About Us</a></li>
           
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Complete Your <span class="highlight">Company Profile</span></h1>
            <p>
                Add your company details to start posting internships and connect with students.
            </p>
        </div>

        <div class="form-box company-form-box">
             <h2>Company Register</h2>

             <form th:action="@{/company/register}"  th:object= "${company}" method="post" autocomplete="off" >

             <div th:if="${message}" style="color: green; margin-bottom: 12px; text-align: center;">
                <strong th:text="${message}"></strong>
             </div>

             <div th:if="${error}" style="color: red; margin-bottom: 12px; text-align: center;">
                <strong th:text="${error}"></strong>
             </div>

            <input type="text"
       name="name"
       placeholder="Company Name"
       required
       autocomplete="off">

<input type="email"
       name="email"
       placeholder="Email"
       required
       autocomplete="off">

<input type="password"
       name="password"
       placeholder="Password"
       required
       autocomplete="new-password">

<input type="text"
       name="field"
       placeholder="Field / Industry"
       required
       autocomplete="off">

<input type="text"
       name="location"
       placeholder="Location"
       required
       autocomplete="off">

<input type="tel"
       name="phone"
       placeholder="Phone"
       required
       autocomplete="off">

<br/>

<textarea name="description"
          placeholder="Company Description"
          rows="4"
          required
          autocomplete="off"></textarea>

<input type="url"
       name="website"
       placeholder="Company Website"
       required
       autocomplete="off">

<label class="file-label">
    Upload Logo (Optional)
</label>

<input type="file"
       id="logoInput"
       name="logo">

<input type="hidden"
       name="logoPath"
       id="logoPath">

<button type="submit" class="form-btn">
    Complete Registration
</button>
        </div>
    </section>

    <script>
        // convert selected file name to path under /images/ and put into hidden field
        const logoInput = document.getElementById('logoInput');
        if (logoInput) {
            logoInput.addEventListener('change', function (e) {
                const f = e.target.files[0];
                if (f) {
                    document.getElementById('logoPath').value = '/images/' + f.name;
                } else {
                    document.getElementById('logoPath').value = '';
                }
            });
        }
    </script>

</body>
</html>
