<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Register - Launchpath</title>
    <link  rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

    <nav class="navbar">
        <div class="logo">🚀 Launchpath</div>

        <ul class="nav-links">
            <li><a th:href="@{/home}">Home</a></li>
            <li><a th:href="@{/about}">About Us</a></li>
           
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Complete Your <span class="highlight">Company Profile</span></h1>
            <p>
                Add your company details to start posting internships and connect with students.
            </p>
        </div>

        <div class="form-box company-form-box">
             <h2>Company Register</h2>

             <form th:action="@{/company/register}"  th:object= "${company}" method="post"  >

             <div th:if="${message}" style="color: green; margin-bottom: 12px; text-align: center;">
                <strong th:text="${message}"></strong>
             </div>

             <div th:if="${error}" style="color: red; margin-bottom: 12px; text-align: center;">
                <strong th:text="${error}"></strong>
             </div>

           <input type="text" th:field="*{name}" placeholder="Company Name" required>

<input type="email" th:field="*{email}" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<input type="text" th:field="*{field}" placeholder="Field / Industry" required>

<input type="text" th:field="*{location}" placeholder="Location" required>

<input type="tel" th:field="*{phone}" placeholder="Phone" required>

<textarea th:field="*{description}" placeholder="Company Description" rows="4" required></textarea>

<input type="url" th:field="*{website}" placeholder="Company Website" required>

<label class="file-label"> Upload Logo (Optional)</label>

<input type="file"  id="logoInput" accept="image/*">

<input type="hidden" th:field="*{logo}" id="logoPath">

<button type="submit" class="form-btn">
    Complete Registration
</button>
             </form>
        </div>
    </section>

    <script>
        // convert selected file name to path under /images/ and put into hidden field
        const logoInput = document.getElementById('logoInput');
        if (logoInput) {
            logoInput.addEventListener('change', function (e) {
                const f = e.target.files[0];
                if (f) {
                    document.getElementById('logoPath').value = '/images/' + f.name;
                } else {
                    document.getElementById('logoPath').value = '';
                }
            });
        }
    </script>

</body>
</html>
